seed: 42
device: cuda
output_dir: outputs
experiment_name: hybrid_cnn_vnwoodknot_eval
checkpoint_path: outputs/checkpoints/hybrid_cnn/best.pt

dataset:
  eval: configs/dataset_transfer.yaml
  split: test

dataset_split:
  seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

model:
  name: hybrid_detector
  num_classes: 10
  use_transformer: false
  num_transformer_blocks: 0
  use_p2_branch: false
  neck_out_channels: 128
  pre_nms_topk: 200
  normalize_inputs: true
  input_mean: [0.485, 0.456, 0.406]
  input_std: [0.229, 0.224, 0.225]
  image_size: 1024
  score_threshold: 0.1
  nms_threshold: 0.5
  max_detections: 50

evaluation:
  batch_size: 1
  num_workers: 0
  score_threshold: 0.1
  save_predictions: false
  save_visualizations: false
  compute_per_class_ap: true
  compute_cross_dataset: true
  in_domain_summary_path: outputs/tables/hybrid_cnn_main_eval_val_summary.json
  in_domain_dataset_label: large_scale_main_val
