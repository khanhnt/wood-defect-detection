seed: 42
device: cuda
output_dir: outputs
experiment_name: baseline_mobilenet_hr_full_7class_eval
checkpoint_path: outputs/checkpoints/baseline_mobilenet_hr_full_7class/best.pt

dataset:
  eval: configs/dataset_main_full_7class.yaml
  split: val

dataset_split:
  seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

model:
  name: baseline_detector
  num_classes: 7
  backbone: mobilenet_hr
  image_size: 1024
  score_threshold: 0.05
  nms_threshold: 0.5
  max_detections: 100

evaluation:
  batch_size: 1
  num_workers: 0
  score_threshold: 0.05
  compute_small_defect_eval: true
  tile_merge: false
  save_predictions: false
  save_visualizations: false
  compute_per_class_ap: true
  compute_cross_dataset: false
