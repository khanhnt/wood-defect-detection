seed: 42
device: cuda
output_dir: outputs
experiment_name: hybrid_detector

dataset:
  train: configs/dataset_main.yaml
  val: configs/dataset_main.yaml

train:
  epochs: 50
  batch_size: 8
  num_workers: 4
  image_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.0001

model:
  name: hybrid_detector
  num_classes: 10
  use_transformer: true
  num_transformer_blocks: 2
  use_p2_branch: true
