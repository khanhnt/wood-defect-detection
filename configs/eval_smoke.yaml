seed: 42
device: cuda
output_dir: outputs/smoke
experiment_name: baseline_detector_smoke_eval
checkpoint_path: outputs/smoke/checkpoints/baseline_detector_smoke/best.pt

dataset:
  eval: configs/dataset_main.yaml
  split: val

dataset_split:
  seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

model:
  name: baseline_detector
  num_classes: 10
  backbone: mobilenet
  image_size: 1024
  score_threshold: 0.05
  nms_threshold: 0.5
  max_detections: 100

evaluation:
  batch_size: 1
  num_workers: 0
  score_threshold: 0.05
  save_predictions: false
  save_visualizations: false
  compute_per_class_ap: true
  compute_cross_dataset: false
  max_samples: 16
