seed: 42
device: cuda
output_dir: outputs
experiment_name: baseline_detector

dataset:
  train: configs/dataset_main.yaml
  val: configs/dataset_main.yaml
  train_split: train
  val_split: val

dataset_split:
  seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

train:
  epochs: 10
  batch_size: 2
  num_workers: 0
  image_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.0001
  best_metric: mAP50_95
  small_defect_sampler:
    enabled: false
    small_weight: 3.0
    positive_weight: 1.5
    negative_weight: 0.5

model:
  name: baseline_detector
  num_classes: 10
  backbone: mobilenet
  image_size: 1024
  score_threshold: 0.05
  nms_threshold: 0.5
  max_detections: 100
