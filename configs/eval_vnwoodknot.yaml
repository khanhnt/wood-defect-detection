seed: 42
device: cuda
output_dir: outputs
experiment_name: baseline_detector_vnwoodknot_eval
checkpoint_path: outputs/checkpoints/baseline_detector/best.pt

dataset:
  eval: configs/dataset_transfer.yaml
  split: test

dataset_split:
  seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

model:
  name: baseline_detector
  num_classes: 10
  backbone: mobilenet
  image_size: 1024
  score_threshold: 0.05
  nms_threshold: 0.5
  max_detections: 100

evaluation:
  batch_size: 1
  num_workers: 0
  score_threshold: 0.05
  save_predictions: false
  save_visualizations: false
  compute_per_class_ap: true
  compute_cross_dataset: true
  in_domain_summary_path: outputs/tables/baseline_detector_main_eval_val_summary.json
  in_domain_dataset_label: large_scale_main_val
