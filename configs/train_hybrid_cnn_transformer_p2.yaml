seed: 42
device: cuda
output_dir: outputs
experiment_name: hybrid_cnn_transformer_p2

dataset:
  train: configs/dataset_main.yaml
  val: configs/dataset_main.yaml
  train_split: train
  val_split: val

dataset_split:
  seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

train:
  epochs: 20
  batch_size: 4
  num_workers: 0
  image_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.0001
  best_metric: mAP50_95

model:
  name: hybrid_detector
  num_classes: 10
  use_transformer: true
  num_transformer_blocks: 1
  use_p2_branch: true
  neck_out_channels: 128
  stage_channels: [64, 128, 192, 256]
  stage_depths: [1, 2, 3, 2]
  num_head_convs: 2
  pre_nms_topk: 200
  center_sampling_radius: 1.5
  box_loss_weight: 2.0
  cls_loss_weight: 1.0
  centerness_loss_weight: 1.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  classification_prior: 0.01
  centerness_prior: 0.01
  normalize_inputs: true
  input_mean: [0.485, 0.456, 0.406]
  input_std: [0.229, 0.224, 0.225]
  transformer_heads: 4
  image_size: 1024
  score_threshold: 0.1
  nms_threshold: 0.5
  max_detections: 50
